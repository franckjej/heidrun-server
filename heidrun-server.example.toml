# Sample HeidrunServer configuration.
#
# Point HEIDRUN_CONFIG at a copy of this file to load it on startup.
# Env vars (HEIDRUN_PORT, HEIDRUN_BIND_HOST, HEIDRUN_DB_PATH,
# HEIDRUN_FILES_ROOT, HEIDRUN_ADMIN_LOGIN, HEIDRUN_ADMIN_PASSWORD,
# HEIDRUN_ADMIN_NICKNAME, HEIDRUN_SERVER_NAME, HEIDRUN_AGREEMENT,
# HEIDRUN_LOG_LEVEL, HEIDRUN_TRACKERS, HEIDRUN_TRACKER_DESCRIPTION,
# HEIDRUN_TLS_PORT, HEIDRUN_TLS_CERTIFICATE, HEIDRUN_TLS_PRIVATE_KEY,
# HEIDRUN_BANNER_PATH, HEIDRUN_BANNER_KIND,
# HEIDRUN_IDLE_AWAY_THRESHOLD, HEIDRUN_IDLE_AWAY_POLL) override whatever is set here.
#
# Every key is optional; missing keys fall back to built-in defaults.

# TCP port for the control channel. The HTXF transfer channel always
# binds at `port + 1`.
port = 5500

# Interface to bind on. "0.0.0.0" listens on all interfaces (the
# normal production setting); "127.0.0.1" restricts to loopback when
# the server sits behind a reverse proxy or for local development.
bind_host = "0.0.0.0"

# Display name shown in the user list.
server_name = "Heidrun"

# swift-log threshold: trace, debug, info, notice, warning, error, critical.
log_level = "info"

# Optional banner text the server pushes after login (transID 109).
# Omit the line to skip the agreement push entirely.
# agreement = "Welcome to the server. Be kind."

# SQLite database for accounts. Omit for an in-memory DB (state lost
# on restart — useful only for tests).
db_path = "/var/lib/heidrun/heidrun.sqlite"

# Filesystem root the file ops operate against. Omit for an
# ephemeral tempdir (test-only).
files_root = "/var/lib/heidrun/files"

# News state JSON snapshot. Omit to derive `<db_path>.news.json`
# automatically; set to a literal path to override, or to an empty
# string to disable persistence (in-memory news that wipes on restart).
# news_state_path = "/var/lib/heidrun/heidrun.news.json"

# News mode. "threaded" (default) serves Hotline 1.5+ threaded
# categories/articles to modern clients and the flat bulletin board to
# legacy clients. "flat" presents the server as a pre-1.5 server so
# EVERY client uses the flat board — it caps the advertised version
# below 151 and rejects threaded-news transactions. "plain" is an alias
# for "flat". Env override: HEIDRUN_NEWS_MODE.
# news_mode = "threaded"

# Seeded only when the accounts table is empty (i.e. first startup
# against a fresh DB). Operators should change these credentials via
# modifyLogin (transID 353) or a follow-up SQL update.
[bootstrap_admin]
login = "admin"
password = "admin"
nickname = "Admin"

# Tracker registration. Each entry is `host[:port][:password]` — port
# is the tracker's UDP registration port, default 5499 (NOT 5498, which
# is the client-side TCP list port); password is empty for public
# trackers. Omit / empty disables tracker registration entirely. The
# announcer sends one UDP packet to each tracker every 5 minutes;
# failed registrations are logged and skipped.
# trackers = [
#     "hltracker.com",
#     "private.example:5499:my-tracker-password"
# ]
# tracker_description = "Heidrun on hosting.tastybytes.org"

# TLS sibling listener. When `tls_port` is set, the server binds a
# second control listener on `tls_port` and a second HTXF listener
# on `tls_port + 1`, both TLS-wrapped. The cleartext pair on
# `port` / `port + 1` stays up for legacy clients. Omit `tls_port`
# (or leave it at 0) to disable TLS entirely.
#
# `tls_certificate` is a PEM-encoded certificate chain (server cert
# first, then any intermediates). `tls_private_key` is the matching
# PEM-encoded private key. Both files must be readable by the
# `heidrun` user when running in Docker.
#
# Recommended setup: Let's Encrypt via DNS-01 challenge with cert +
# fullchain installed at the paths below. Server restart picks up
# renewed certs on next bind.
# tls_port = 5502
# tls_certificate = "/etc/heidrun-server/tls/fullchain.pem"
# tls_private_key = "/etc/heidrun-server/tls/privkey.pem"

# Server banner image (transID 212). Loaded once at startup; updating
# the file needs a restart. Path must be readable by the heidrun
# user — chown it the same way you do for the TLS cert. Recommended
# size: ~468×60 pixels (classic-era Hotline standard); larger images
# scale down to an 80pt max height in the Heidrun client.
#
# banner_kind is the format hint sent in the 212 reply's bannerType
# field (152). One of: jpeg, gif, bmp, pict, url. JPEG is the
# realistic default. URL-mode treats the file's contents as a UTF-8
# link the client fetches itself.
# banner_path = "/etc/heidrun-server/banner.jpg"
# banner_kind = "jpeg"

# Idle auto-away. After `idle_away_threshold` seconds of no inbound
# packets from a session, the server flips its UserStatusFlags.away
# bit and broadcasts userChanged so other clients dim that row. The
# next packet from the session clears it again. The supervisor
# walks the live session list every `idle_away_poll_interval`
# seconds. Set the threshold to 0 (or omit) to disable. Note:
# transID 500 client keepalive pings are NOT counted as activity
# (otherwise idle would never fire in practice).
# Defaults: 600 seconds idle, 60 second poll.
# idle_away_threshold = 600
# idle_away_poll_interval = 60

# One-shot upgrade hook for operators crossing the May 22 2026 commit
# (`8a78eb1`) that bumped the bootstrap admin seed from 5 enforcement
# bits to `UserPrivileges.all`. When `true`, the server rewrites the
# bootstrap admin row's permissions to UserPrivileges.all on the
# next startup, even when the row already exists. Flip on, deploy
# once, flip back off so subsequent restarts don't clobber operator-
# tightened permissions. Default false. Env override:
# HEIDRUN_RESET_ADMIN_PERMISSIONS=1.
# reset_admin_permissions = false
