# Convenience compose file for HeidrunServer.
#
# Run from this repo's root:
#   docker compose up -d --build
#
# Stop:
#   docker compose down
#
# State persists in the `heidrun-data` named volume (DB + news JSON +
# the file tree by default — see the "files tree" notes below for how
# to point the file tree at an existing host directory instead).
#
# This file is intentionally env-var driven: every server option has a
# `HEIDRUN_*` environment variable equivalent and they're all listed
# (commented) under `environment:` below. Uncomment the ones you need.
# Operators who prefer a TOML config file can mount one and set
# `HEIDRUN_CONFIG=/path/to/file.toml` — see the very last entry in the
# environment block. Env vars always override the TOML file.
#
# To change the admin password, edit the `HEIDRUN_ADMIN_PASSWORD`
# entry below before the first `up` (the seed only fires against an
# empty DB). After first launch, change passwords via the modifyLogin
# (353) admin transaction from a logged-in client.

services:
  heidrun:
    image: heidrun-server:latest
    build:
      context: .
      dockerfile: Dockerfile
      # Build identifier + date now auto-stamp from the repo's `.git`
      # via the Dockerfile's `git-info` stage. No build args needed.
      # Operators wanting a different stamp (CI tag, release tarball
      # shipped without .git, etc.) can override at *runtime* via the
      # `environment:` block below:
      #
      #   environment:
      #     HEIDRUN_BUILD: "v1.0.0"
      #     HEIDRUN_BUILD_DATE: "2026-06-01"
    container_name: heidrun-server
    restart: unless-stopped
    ports:
      - "5500:5500"          # control channel (cleartext)
      - "5501:5501"          # HTXF transfer side-channel (cleartext)
      # TLS sibling pair — uncomment together with the HEIDRUN_TLS_*
      # env vars below and the TLS cert bind-mount in `volumes:`.
      # - "5502:5502"        # control channel (TLS)
      # - "5503:5503"        # HTXF transfer side-channel (TLS)
    volumes:
      # Default: SQLite DB + news state JSON + (unless overridden
      # below) the file tree all live in this named volume.
      - heidrun-data:/var/lib/heidrun

      # --- Optional: hook up an existing files tree on the host ---
      #
      # Bind-mount a host directory (e.g. a multi-TB RAID at
      # /home/files) at a stable path inside the container, then point
      # HEIDRUN_FILES_ROOT at it via the `environment:` block below.
      # Bind mounts are NOT copied or seeded — the existing tree shows
      # up to the server as-is, and `down`/`up` cycles never touch it.
      #
      # Before the first `up`, make /home/files readable + writable by
      # the container's `heidrun` user (UID/GID is whatever
      # `useradd --system` picked at image-build time):
      #   HEIDRUN_UID=$(docker exec heidrun-server id -u heidrun)
      #   HEIDRUN_GID=$(docker exec heidrun-server id -g heidrun)
      #   sudo chown -R "$HEIDRUN_UID:$HEIDRUN_GID" /home/files
      #   sudo chmod -R u+rwX,g+rwX /home/files
      #
      # SAFETY: a logged-in user with the .deleteFiles / .deleteFolders
      # privilege bit can wipe files from the RAID via the 204 delete
      # transaction. Don't grant those bits to non-admin accounts, or
      # use the read-only / split-layout variants below.
      #
      # - /home/files:/srv/heidrun/files
      #
      # Read-only variant — files are visible and downloadable, but no
      # uploads/renames/deletes happen against the RAID:
      # - /home/files:/srv/heidrun/files:ro
      #
      # Split layout — read-only archive + writable incoming area.
      # Combine with a single HEIDRUN_FILES_ROOT=/srv/heidrun/files
      # and let clients browse archive/ vs. incoming/:
      # - /home/files/archive:/srv/heidrun/files/archive:ro
      # - /home/files/incoming:/srv/heidrun/files/incoming

      # --- Optional: TLS certificate + key ---
      #
      # Mount the directory holding your TLS PEMs read-only at a
      # stable path inside the container, then set
      # HEIDRUN_TLS_CERTIFICATE / HEIDRUN_TLS_PRIVATE_KEY below to
      # point at the files. With Let's Encrypt's `certbot`, the
      # standard layout under /etc/letsencrypt/live/<domain>/ maps:
      #   fullchain.pem -> HEIDRUN_TLS_CERTIFICATE
      #   privkey.pem   -> HEIDRUN_TLS_PRIVATE_KEY
      # so a `:ro` bind of the parent directory works directly.
      # - /etc/heidrun-server/tls:/etc/heidrun-server/tls:ro
    environment:
      # ---------------------------------------------------------------
      # REQUIRED-ISH (these have defaults but you almost always set them)
      # ---------------------------------------------------------------

      # Bootstrap admin password — seeded ONLY when the accounts DB
      # is empty. Change this BEFORE first `up`; after that, rotate
      # via the modifyLogin (353) admin transaction from a client.
      HEIDRUN_ADMIN_PASSWORD: "CHANGE_ME_BEFORE_FIRST_RUN"

      # Display name shown in client user lists + tracker listings.
      HEIDRUN_SERVER_NAME: "Heidrun"

      # Server timezone (IANA name, e.g. "Europe/Berlin", "America/New_York").
      # Drives the timestamp in classic flat-news posts and other
      # local-time rendering. The container defaults to UTC; set your
      # zone here. Resolves via tzdata, which the image installs.
      TZ: "Europe/Berlin"

      # swift-log threshold: trace / debug / info / notice / warning /
      # error / critical. Use `debug` to get per-transaction dispatch
      # lines tagged with the client IP (remoteHost) for triage.
      HEIDRUN_LOG_LEVEL: "info"

      # ---------------------------------------------------------------
      # NETWORK BINDING
      # ---------------------------------------------------------------

      # Control TCP port; HTXF transfer port is always control + 1.
      # If you change this, also update the `ports:` mapping above.
      # HEIDRUN_PORT: "5500"

      # Interface to bind on inside the container. "0.0.0.0" listens
      # on all interfaces (the normal Docker setup); "127.0.0.1"
      # restricts to loopback (only useful for sidecar deployments).
      # HEIDRUN_BIND_HOST: "0.0.0.0"

      # ---------------------------------------------------------------
      # BOOTSTRAP ADMIN ACCOUNT (only seeded on a fresh DB)
      # ---------------------------------------------------------------

      # HEIDRUN_ADMIN_LOGIN: "admin"
      # HEIDRUN_ADMIN_NICKNAME: "Admin"

      # ---------------------------------------------------------------
      # PATHS (Dockerfile defaults shown — usually fine as-is)
      # ---------------------------------------------------------------

      # SQLite database file. Holds accounts + per-file metadata
      # (comments + HFS type/creator).
      # HEIDRUN_DB_PATH: "/var/lib/heidrun/heidrun.sqlite"

      # Root of the file tree the server serves. Uncomment together
      # with one of the bind mounts above to point at an existing host
      # directory (e.g. /srv/heidrun/files when bind-mounting
      # /home/files); leave commented to use the named volume default.
      # HEIDRUN_FILES_ROOT: "/var/lib/heidrun/files"

      # News-state JSON snapshot. Leave unset to derive
      # `<db_path>.news.json` automatically; set to a specific path
      # to override.
      # HEIDRUN_NEWS_PATH: "/var/lib/heidrun/heidrun.news.json"

      # News mode: "threaded" (default) or "flat". "flat" presents the
      # server as a pre-1.5 server so every client uses the flat
      # bulletin board (caps the advertised version < 151 and rejects
      # threaded-news transactions). "plain" is an alias for "flat".
      # HEIDRUN_NEWS_MODE: "threaded"

      # One-shot startup news wipe. Set to "flat", "threaded", or "all"
      # ("plain"/"both" aliases) to clear the chosen store and re-persist
      # an empty snapshot before serving — then COMMENT IT OUT AGAIN and
      # redeploy, or the next restart wipes news every time. Operator-
      # driven, like HEIDRUN_RESET_ADMIN_PERMISSIONS.
      # HEIDRUN_NEWS_RESET: "all"

      # ---------------------------------------------------------------
      # POLICY
      # ---------------------------------------------------------------

      # Banner text pushed after login (transID 109). Comment out to
      # skip the agreement push entirely.
      # HEIDRUN_AGREEMENT: "Welcome to the server. Be kind."

      # DEPRECATED alias of HEIDRUN_AUDIT_LOG_ENABLED (see Audit log
      # below) — still honoured for old deployments. Drives the audit
      # master switch when HEIDRUN_AUDIT_LOG_ENABLED is unset. Set to "0"
      # (or false/no/off) to disable recording entirely.
      # HEIDRUN_USER_HISTORY: "0"

      # ---------------------------------------------------------------
      # AUDIT LOG
      # ---------------------------------------------------------------
      #
      # Records presence (join/leave), file transfers, logins, and admin
      # actions to a SEPARATE SQLite file so it can be rotated or erased
      # independently of accounts. Read back with the admin /audit chat
      # command (aliases /transfers, /authlog, /adminlog; /usershistory
      # shows presence). First run auto-creates the DB + schema.

      # Master switch. On by default. Set to "0" (false/no/off) to
      # disable all audit recording — a privacy kill-switch. Replaces
      # HEIDRUN_USER_HISTORY (still honoured as an alias).
      # HEIDRUN_AUDIT_LOG_ENABLED: "0"

      # Audit DB file. Leave unset to derive `<db_path>.audit.sqlite`
      # automatically — so by default it lands in the heidrun-data volume
      # next to the accounts DB and persists across `down`/`up` with no
      # extra volume. Set a path to override; in-memory (wipes on restart)
      # only when HEIDRUN_DB_PATH is also unset.
      # HEIDRUN_AUDIT_DB_PATH: "/var/lib/heidrun/heidrun.audit.sqlite"

      # Days of audit history to keep (prune-on-write). Default 90.
      # HEIDRUN_AUDIT_RETENTION_DAYS: "90"

      # Store each client's raw IP in audit rows. OFF by default — raw
      # IPs are personal data under the GDPR; enable only with a lawful
      # basis. Retention above bounds how long they persist.
      # HEIDRUN_LOG_IP_ADDRESSES: "1"

      # ---------------------------------------------------------------
      # TRACKER REGISTRATION (host[:port][:password])
      # ---------------------------------------------------------------

      # Comma-separated list. Omit / empty to disable. Each entry is
      # `host`, `host:port`, or `host:port:password`. The port is the
      # tracker's UDP registration/discovery port — default 5499. (Note:
      # 5498 is the *client* TCP list port; registering on it makes the
      # server silently never appear.) The announcer sends one UDP packet
      # to each tracker every 5 minutes; failures are logged and skipped.
      # HEIDRUN_TRACKERS: "hltracker.com,tracker.preterhuman.net,tracker.tildeverse.org"

      # Free-text description shown in tracker listings (falls back to
      # HEIDRUN_SERVER_NAME if unset).
      # HEIDRUN_TRACKER_DESCRIPTION: "Heidrun on example.org"

      # ---------------------------------------------------------------
      # TLS SIBLING LISTENER
      # ---------------------------------------------------------------
      #
      # When HEIDRUN_TLS_PORT is set, the server binds an additional
      # TLS-wrapped control listener on that port and a TLS-wrapped
      # HTXF listener on `tls_port + 1`. The cleartext pair stays up
      # for legacy clients.
      #
      # All three TLS vars are required together — `tls_port` set
      # without a cert/key path fails startup with a clear error
      # rather than silently falling back to cleartext.
      #
      # Cert paths must be readable by the unprivileged `heidrun`
      # user inside the container. The bind-mount stanza above keeps
      # them in /etc/heidrun-server/tls.
      # HEIDRUN_TLS_PORT: "5502"
      # HEIDRUN_TLS_CERTIFICATE: "/etc/heidrun-server/tls/fullchain.pem"
      # HEIDRUN_TLS_PRIVATE_KEY: "/etc/heidrun-server/tls/privkey.pem"

      # ---------------------------------------------------------------
      # SERVER BANNER (transID 212)
      # ---------------------------------------------------------------
      #
      # Optional image surfaced to clients when they request the
      # server banner (typically once per login). Loaded into memory
      # at startup; updating the file needs a container restart
      # (same workflow as the TLS cert). The file must be readable
      # by the heidrun user — bind-mount the directory + chown its
      # contents the same way you do for TLS certs.
      #
      # HEIDRUN_BANNER_KIND is the format hint sent in the 212
      # reply's bannerType field (152). One of: jpeg, gif, bmp,
      # pict, url. JPEG is the realistic default — clients decode
      # the bytes directly. URL mode treats the file's contents as
      # a UTF-8 link the client fetches itself.
      # HEIDRUN_BANNER_PATH: "/etc/heidrun-server/banner.jpg"
      # HEIDRUN_BANNER_KIND: "jpeg"

      # ---------------------------------------------------------------
      # TOML CONFIG FILE (opt-in alternative to the env vars above)
      # ---------------------------------------------------------------
      #
      # Setting HEIDRUN_CONFIG points the executable at a TOML file
      # that lays out the same keys in snake_case form. Env vars
      # ALWAYS override the file, so a deploy that wants "TOML for
      # most things, env override for one secret" works naturally.
      # The Dockerfile bakes a sample at
      # /etc/heidrun-server/config.toml; bind-mount your own to
      # /etc/heidrun-server/ if you want to use that path.
      # HEIDRUN_CONFIG: "/etc/heidrun-server/config.toml"
    # Heidrun clients don't have a TCP health-probe path; the
    # transfer port being open is a workable proxy. Swap to a real
    # protocol check if the upcoming admin CLI ships one.
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5500 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  heidrun-data:
